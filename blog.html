<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blog | HopeReach Foundation</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="assets/css/main.css">
    <link rel="stylesheet" href="assets/css/components.css">
    <link rel="stylesheet" href="assets/css/animations.css">
    <link rel="stylesheet" href="assets/css/responsive.css">
</head>
<body>
    <div id="navbar-placeholder"></div>

    <section class="page-header">
        <div class="container">
            <h1>Latest Stories & Updates</h1>
            <p>Insights from the field and news from our foundation.</p>
        </div>
    </section>

    <section class="blog-section">
        <div class="container">
            <div id="blog-grid" class="blog-grid">
                <!-- Blog posts will be loaded here via JS -->
                <div class="loading">Loading stories...</div>
            </div>
        </div>
    </section>

    <div id="footer-placeholder"></div>

    <script src="assets/js/main.js"></script>
    <script src="assets/js/whatsapp.js"></script>
    <script>
        async function loadComponent(id, path) {
            const response = await fetch(path);
            const text = await response.text();
            document.getElementById(id).innerHTML = text;
        }
        loadComponent('navbar-placeholder', 'components/navbar.html');
        loadComponent('footer-placeholder', 'components/footer.html');

        // Dynamic Blog Loading
        async function loadBlogPosts() {
            try {
                const response = await fetch('blog-data/posts.json');
                const posts = await response.json();
                const grid = document.getElementById('blog-grid');
                grid.innerHTML = '';

                posts.forEach(post => {
                    const postCard = `
                        <article class="card blog-card" data-reveal>
                            <div class="card-img">
                                <img src="${post.image}" alt="${post.title}">
                                <span class="category-tag">${post.category}</span>
                            </div>
                            <div class="card-content">
                                <div class="post-meta">
                                    <span><i class="far fa-calendar"></i> ${post.date}</span>
                                    <span><i class="far fa-user"></i> ${post.author}</span>
                                </div>
                                <h3>${post.title}</h3>
                                <p>${post.excerpt}</p>
                                <a href="#" class="read-more">Read Full Story →</a>
                            </div>
                        </article>
                    `;
                    grid.innerHTML += postCard;
                });
                
                // Re-trigger reveal animation for new elements
                if (window.revealOnScroll) window.revealOnScroll();
            } catch (error) {
                console.error('Error loading blog posts:', error);
                document.getElementById('blog-grid').innerHTML = '<p>Failed to load blog posts. Please try again later.</p>';
            }
        }
        loadBlogPosts();
    </script>

    <style>
        .page-header { background: var(--primary-color); color: var(--white); text-align: center; padding: 60px 0; }
        .blog-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 30px; padding: 50px 0; }
        .blog-card { height: 100%; display: flex; flex-direction: column; }
        .blog-card .card-img { position: relative; }
        .category-tag { position: absolute; top: 15px; left: 15px; background: var(--primary-color); color: var(--white); padding: 5px 12px; border-radius: 20px; font-size: 0.8rem; font-weight: 600; }
        .post-meta { display: flex; gap: 15px; font-size: 0.85rem; color: var(--text-light); margin-bottom: 10px; }
        .blog-card h3 { margin-bottom: 15px; font-size: 1.3rem; line-height: 1.4; }
        .blog-card p { color: var(--text-light); margin-bottom: 20px; flex-grow: 1; }
        @media (max-width: 1024px) { .blog-grid { grid-template-columns: 1fr 1fr; } }
        @media (max-width: 768px) { .blog-grid { grid-template-columns: 1fr; } }
    </style>
</body>
</html>
